<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SomeStore</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <header>
        <nav class="navbar">
            <div class="logo">
                <a href="index.html">
                    <h2>Some<span>Store</span></h2>
                </a>
            </div>
            <div class="nav-links">
                <a href="index.html">HOME</a>
                <a href="mens.html">MEN</a>
                <a href="womens.html">WOMEN</a>
                <a href="kids.html">KIDS</a>
            </div>
            <div class="search-bar">
                <input type="text" placeholder="Search for products, brands and more">
                <i class="fas fa-search search-icon"></i>
            </div>

            <div class="nav-links d-flex gap-4 justify-content-center align-items-center">
                <button id="loginBtn" type="button" class="btn btn-light text-dark" data-bs-toggle="modal"
                    data-bs-target="#loginModal">
                    Login
                </button>
                <button id="registerBtn" type="button" class="btn btn-light text-dark" data-bs-toggle="modal"
                    data-bs-target="#registerModal">
                    Register
                </button>
            </div>
        </nav>
    </header>

    <div class="modal fade" id="loginModal" tabindex="-1" aria-labelledby="loginModalLabel" aria-hidden="true">
        <div class="modal-dialog" role="document">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="loginModalLabel">Login</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <form>
                        <div class="mb-3">
                            <label for="email" class="form-label">Email address</label>
                            <input type="email" class="form-control" id="email" placeholder="name@example.com" required>
                        </div>
                        <div class="mb-3">
                            <label for="password" class="form-label">Password</label>
                            <input type="password" class="form-control" id="password" placeholder="Password" required>
                        </div>
                        <div class="mb-3 form-check">
                            <input type="checkbox" class="form-check-input" id="rememberMe">
                            <label class="form-check-label" for="rememberMe">Remember me</label>
                        </div>
                        <div class="text-center">
                            <button type="submit" class="btn btn-primary">Sign In</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="registerModal" tabindex="-1" aria-labelledby="registerModalLabel" aria-hidden="true">
        <div class="modal-dialog" role="document">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="registerModalLabel">Register</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <form>
                        <div class="mb-3">
                            <label for="regName" class="form-label">Name</label>
                            <input type="text" class="form-control" id="regName" required>
                        </div>
                        <div class="mb-3">
                            <label for="regEmail" class="form-label">Email address</label>
                            <input type="email" class="form-control" id="regEmail" placeholder="name@example.com"
                                required>
                        </div>
                        <div class="mb-3">
                            <label for="regPassword" class="form-label">Password</label>
                            <input type="password" class="form-control" id="regPassword" placeholder="Password"
                                required>
                        </div>
                        <div class="mb-3">
                            <label for="regConfirm" class="form-label">Confirm Password</label>
                            <input type="password" class="form-control" id="regConfirm" placeholder="Confirm Password"
                                required>
                        </div>
                        <button type="submit" class="btn btn-primary w-100">Sign Up</button>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
                </div>
            </div>
        </div>
    </div>

    <section class="categories-section">
        <div class="category-item">
            <a href="mens.html" class="no-style-link">
                <div class="cat-img-wrapper">
                    <img src="https://images.unsplash.com/photo-1621072156002-e2fccdc0b176?w=400&h=400&fit=crop"
                        alt="Men">
                </div>
                <span>Men</span>
            </a>
        </div>
        <div class="category-item">
            <a href="womens.html" class="no-style-link">
                <div class="cat-img-wrapper">
                    <img src="https://images.unsplash.com/photo-1515372039744-b8f02a3ae446?w=400&h=400&fit=crop"
                        alt="Women">
                </div>
                <span>Women</span>
            </a>
        </div>
        <div class="category-item">
            <a href="kids.html" class="no-style-link">
                <div class="cat-img-wrapper">
                    <img src="https://img0.junaroad.com/uiproducts/20536192/pri_175_p-1714045372.jpg" alt="Kids">
                </div>
                <span>Kids</span>
            </a>
        </div>
    </section>

    <section class="hero-section">
        <img src="https://images.unsplash.com/photo-1483985988355-763728e1935b?ixlib=rb-1.2.1&auto=format&fit=crop&w=1950&q=80"
            alt="Hero Image" class="hero-bg-img">
        <div class="hero-content">
            <div class="hero-text">
                <h2>End of Season Sale</h2>
                <h1>60% - 80% OFF</h1>
                <p>On Top International Brands</p>
                <button class="main-btn">Explore Now</button>
            </div>
        </div>
    </section>

    <section class="products-container">
        <h2 class="section-heading">Deals of the Day</h2>
        <div class="prod-grid" id="prod-grid">

        </div>
    </section>

    <footer>

        <div class="footer-bottom">
            <p>@ 2026 SomeStore. All rigths reserved.</p>
        </div>
    </footer>

    <script>
        const loginBtn = document.getElementById('loginBtn');
        const registerBtn = document.getElementById('registerBtn');
        const loginModal = document.getElementById('loginModal');
        const loginForm = loginModal.querySelector('form');

        function updateLogin() {
            const isLogin = localStorage.getItem('isLogin') === 'true';
            loginBtn.textContent = isLogin ? 'User' : 'Login';
            registerBtn.style.display = isLogin ? 'none' : '';

            if (isLogin) {
                loginBtn.classList.remove('btn-light', 'text-dark');
                loginBtn.classList.add('btn-secondary', 'text-white');
            } else {
                loginBtn.classList.remove('btn-secondary', 'text-white');
                loginBtn.classList.add('btn-light', 'text-dark');
            }
        }

        loginForm.addEventListener('submit', function (e) {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            localStorage.setItem('email', email);
            localStorage.setItem("password", password);
            localStorage.setItem('isLogin', 'true');

            updateLogin();
            bootstrap.Modal.getInstance(loginModal).hide();
        });

        updateLogin();

        const searchInput = document.querySelector('.search-bar input');
        const grid = document.getElementById('prod-grid');
        let allProducts = [];

        function render(list) {
            grid.innerHTML = list.map(product => `
        <div class="prod-card">
        <div class="prod-img">
            <div class="rating-badge">${product.rating} <i class="fas fa-star"></i></div>
            <img src="${product.image}" alt="${product.name}">
        </div>
        <div class="prod-details">
            <h3 class="brand-name">${product.brand}</h3>
            <p class="prod-name">${product.name}</p>
            <div class="price-row">
            <span class="current-price">₹${product.price}</span>
            <span class="original-price">₹${product.original_price}</span>
            <span class="discount">(${product.discount})</span>
        </div>
        </div>
    </div>
    `).join('');
        }

        async function loadProducts() {
            try {
                const resp = await fetch('products.json');
                allProducts = await resp.json();
                render(allProducts);
            } catch (e) {
                console.error(e);
            }
        }

        loadProducts();

        let search;
        searchInput.addEventListener('input', () => {
            clearTimeout(search);
            search = setTimeout(() => {
                const query = searchInput.value.toLowerCase();
                const filtered = allProducts.filter(p =>
                    p.name.toLowerCase().includes(query) ||
                    p.brand.toLowerCase().includes(query) ||
                    p.category.toLowerCase().includes(query)
                );
                render(filtered);
            }, 300);
        });
    </script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>

</body>

</html>
