<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>College Event Management Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <style>
        body {
            background-color: #f8f9fa;
        }

        .navbar {
            box-shadow: 0 2px 4px rgba(0, 0, 0, .1);
        }

        .card {
            transition: transform .2s;
        }

        .card:hover {
            transform: translateY(-5px);
        }

        .modal-header {
            background-color: #0d6efd;
            color: #fff;
        }
    </style>
</head>


<body>

    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container-fluid">
            <a class="navbar-brand" href="#">College Events</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"
                aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link active" aria-current="page" href="#">Dashboard</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#">Events</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#">Settings</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container-fluid mt-4">
        <div class="row">
            <div class="col-12 col-md-3 mb-3">
                <div class="list-group">
                    <a href="#" class="list-group-item list-group-item-action active">overview</a>
                    <a href="#" class="list-group-item list-group-item-action">upcoming events</a>
                    <a href="#" class="list-group-item list-group-item-action">past events</a>
                    <a href="#" class="list-group-item list-group-item-action">create event</a>
                </div>
            </div>
            <div class="col-12 col-md-9">
                <div class="d-flex justify-content-between align-items-center mb-3">
                    <h2 class="h4">event List</h2>
                    <button class="btn btn-success" data-bs-toggle="modal" data-bs-target="#addEventModal">Add new
                        event</button>
                </div>

                <div class="row row-cols-1 row-cols-sm-2 row-cols-lg-3 g-3">
                    <div class="col">
                        <div class="card h-100">
                            <div class="card-body">
                                <h5 class="card-title">Science Fair</h5>
                                <p class="card-text">Date: 2026-03-10<br>Location: Main Hall</p>
                                <a href="#" class="btn btn-primary btn-sm">Details</a>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="addEventModal" class="modal fade" tabindex="-1" aria-labelledby="addEventModalLabel" aria-hidden="true">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="addEventModalLabel">Add New Event</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <form id="eventForm" class="needs-validation" novalidate>
                        <div class="mb-3">
                            <label for="eventName" class="form-label">Event Name</label>
                            <input type="text" class="form-control" id="eventName" required>
                            <div class="invalid-feedback">
                                Please provide a name for the event.
                            </div>
                        </div>
                        <div class="mb-3">
                            <label for="eventDate" class="form-label">Date</label>
                            <input type="date" class="form-control" id="eventDate" required>
                            <div class="invalid-feedback">
                                Please select a date.
                            </div>
                        </div>
                        <div class="mb-3">
                            <label for="eventLocation" class="form-label">Location</label>
                            <input type="text" class="form-control" id="eventLocation" required>
                            <div class="invalid-feedback">
                                Please enter a location.
                            </div>
                        </div>
                        <div class="mb-3">
                            <label for="eventDescription" class="form-label">Description</label>
                            <textarea class="form-control" id="eventDescription" rows="3"></textarea>
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
                    <button type="button" class="btn btn-primary" id="saveEventBtn">Save Event</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
    <script>
        (function () {
            'use strict';
            var forms = document.querySelectorAll('.needs-validation');
            Array.prototype.slice.call(forms).forEach(function (form) {
                form.addEventListener('submit', function (event) {
                    if (!form.checkValidity()) {
                        event.preventDefault();
                        event.stopPropagation();
                    }
                    form.classList.add('was-validated');
                }, false);
            });
        })();

        document.getElementById('saveEventBtn').addEventListener('click', function () {
            var form = document.getElementById('eventForm');
            if (form.checkValidity()) {
                var name = document.getElementById('eventName').value;
                var date = document.getElementById('eventDate').value;
                var loc = document.getElementById('eventLocation').value;
                var desc = document.getElementById('eventDescription').value;

                var col = document.createElement('div');
                col.className = 'col';
                var card = document.createElement('div');
                card.className = 'card h-100';
                var body = document.createElement('div');
                body.className = 'card-body';
                body.innerHTML = '<h5 class="card-title">' + name + '</h5>' +
                    '<p class="card-text">Date: ' + date + '<br>Location: ' + loc + '</p>';
                var btn = document.createElement('a');
                btn.className = 'btn btn-primary btn-sm';
                btn.href = '#';
                btn.textContent = 'Details';
                body.appendChild(btn);
                card.appendChild(body);
                col.appendChild(card);
                document.querySelector('.row.row-cols-1.row-cols-sm-2.row-cols-lg-3').appendChild(col);

                var modal = bootstrap.Modal.getInstance(document.getElementById('addEventModal'));
                modal.hide();
                form.reset();
                form.classList.remove('was-validated');
            } else {
                form.classList.add('was-validated');
            }
        });
    </script>
</body>

</html>
