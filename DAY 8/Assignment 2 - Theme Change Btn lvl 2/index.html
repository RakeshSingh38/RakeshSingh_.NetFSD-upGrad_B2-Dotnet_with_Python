<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dark mode</title>

    <!-- 
LEVEL – 1 (Problem 2): Theme Toggle Application 
Scenario: 
A small blog website wants to allow users to switch between Light Mode and Dark Mode interactively. 
  
📌 Requirements 
• Create a toggle button to switch themes. 
• Change background and text color dynamically. 
• Store theme preference in localStorage. 
  
🛠️ Technical Constraints 
• Use Vanilla JavaScript. 
• Use addEventListener() for events. 
• No CSS frameworks. 
  
Expectations: 
• Smooth theme switching. 
• Proper usage of localStorage. 
• Clean and modular JavaScript functions. 
  
🎯 Learning Outcome 
• Handling user interaction events. 
• Managing browser storage.
    -->
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            transition: 0.3s;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        body.light {
            background-color: white;
            color: black;
        }

        body.dark {
            background-color: #1a1a1a;
            color: white;
        }

        header {
            padding: 1rem 2rem;
        }

        body.light header {
            background-color: #f8f9fa;
        }

        body.dark header {
            background-color: #2d2d2d;
        }

        .nav-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .nav-bar ul {
            display: flex;
            list-style: none;
            gap: 2rem;
        }

        .nav-bar li {
            cursor: pointer;
            transition: 0.2s;
        }

        .nav-bar li:hover {
            opacity: 0.7;
        }

        #theme {
            border: none;
            padding: 0.5rem 1rem;
            transition: 0.3s;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
        }

        body.light #theme {
            background-color: #333;
            color: white;
        }

        body.dark #theme {
            background-color: #f8f9fa;
            color: #333;
        }

        #theme:hover {
            opacity: 0.8;
        }

        .container {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
        }

        footer {
            padding: 1.5rem 2rem;
            text-align: center;
        }

        body.light footer {
            background-color: #f8f9fa;
            border-top: 1px solid #ddd;
        }

        body.dark footer {
            background-color: #2d2d2d;
            border-top: 1px solid #444;
        }

        footer p {
            margin: 0.5rem 0;
        }
    </style>
</head>

<body class="light">

    <header>
        <nav>
            <div class="nav-bar">
                <ul>
                    <li>Home</li>
                    <li>About</li>
                    <li>Blog</li>
                    <li>Contact</li>
                </ul>
                <button id="theme">Toggle Dark Mode</button>
            </div>
        </nav>
    </header>

    <main class="container">
        <h1>Welcome to my blog</h1>
    </main>

    <footer>
        <p>@ 2026 SomeBlog. All rights reserved</p>
    </footer>

    <script>

        let themeBtn = document.getElementById("theme");

        themeBtn.addEventListener("click", () => {
            const currentT = document.body.className;
            const newTheme = currentT === "light" ? "dark" : "light";
            document.body.className = newTheme;
            localStorage.setItem("theme", newTheme);
        })

        let theme = localStorage.getItem("theme");
        document.body.className = theme;
    </script>
</body>

</html>
