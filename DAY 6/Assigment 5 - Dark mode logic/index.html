<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dark mode</title>
    <style>
     /*    Dark Mode toggle 1) Create a button to change light mode and dark mode 2) store a variable for that in local storage 3) onclick the background should change to black and text to white and if clicked again the background should change to white and text to black // note   body.dark is called compound selector in css

        // see    dont target * height instead target container's height  */
        * {
            margin: 0;
            padding: 0;
        }

        body {
            transition: 0.3s;
        }

        body.light {
            background-color: white;
            color: black;
        }

        body.dark {
            background-color: black;
            color: white;
        }

        .container {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
        }

        .container button {
            padding: 10px;
        }
    </style>
</head>

<body class="light">
    <main class="container">
        <button onclick="toggleTheme()">Toggle Dark Mode</button>
    </main>

    <script>
        function toggleTheme() {
            const currentT = document.body.className;
            const newTheme = currentT === "light" ? "dark" : "light";
            document.body.className = newTheme;
            localStorage.setItem("theme", newTheme);
        }

        let theme = localStorage.getItem("theme");
        document.body.className = theme;
    </script>
</body>

</html>
