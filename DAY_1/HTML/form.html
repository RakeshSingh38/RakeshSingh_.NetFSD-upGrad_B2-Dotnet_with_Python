<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <h1>Sign up form</h1>

    <button>
        <a href="index.html">Go to Prev Page</a>
    </button>
    <hr>
    <form action="post" type="submit">

        <label for="name">Name : </label>
        <input type="text" id="Name" placeholder="Type your name" required>
        <br>
        <br>
        <label for="number">Number : </label>
        <input type="number" id="number" placeholder="Type your number">
        <br>
        <br>
        <label for="email">Email : </label>
        <input type="email" id="email" placeholder="Type your email" required>
        <br>
        <br>
        <label for="password">Password :</label>
        <input type="password" placeholder="Type your password" required>
        <br>
        <br>
        <label for="phone">Phone : </label>
        <input type="tel" id="phone" placeholder="Type your phone no">
        <br>
        <br>
        <hr>
        <label for="check">Skills :</label>
        <br>
        <br>
        <input type="checkbox" name="checkbox" id="check">HTML <br><br>
        <input type="checkbox" name="checkbox" id="check">CSS <br><br>
        <input type="checkbox" name="checkbox" id="check">JS <br><br>
        <input type="checkbox" name="checkbox" id="check">TypeScript <br><br>
        <input type="checkbox" name="checkbox" id="check">Next.js <br><br>

        <hr>
        <label for="">Select Option :</label>
        <select name="skill" id="" required>
            <option value="Option 1">Option 1</option>
            <option value="Option 2">Option 2</option>
            <option value="Option 3">Option 3</option>
            <option value="Option 4">Option 4</option>
        </select>
        <br>
        <br>
        <button>Submit</button>
    </form>
</body>

</html>
