<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flex box</title>
    <link rel="stylesheet" href="flex.css">
</head>

<body>
    <div class="container">
        <div class="box">Home</div>
        <div class="box">Projects</div>
        <div class="box">Experience</div>
        <div class="box">Certifications</div>
        <div class="box">Contact Me</div>
    </div>

    <div class="content">
        <div class="card">
            <img src="./assets/profile.png" alt="profile pic" class="profile-pic">
            <h1 class="my-name">Rakesh Singh</h1>
            <p class="my-role">Developer</p>
            <p class="my-bio">Turning coffee into code and chaos into clean commits</p>
            <button class="contact-button">Contact</button>
        </div>
    </div>
</body>

</html>
