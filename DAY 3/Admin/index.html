<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="dashboard-container">
        <nav class="sidebar">
            <div class="sidebar-header">
                <h2>Admin</h2>
            </div>
            <ul class="nav-links">
                <li><button class="nav-button">Dashboard</button></li>
                <li><button class="nav-button">Profile</button></li>
                <li><button class="nav-button">Settings</button></li>
                <li><button class="nav-button">Logout</button></li>
            </ul>
        </nav>

        <main class="main-content">
            <header class="top-bar">
                <h1 style="text-align: center;">Dashboard overview</h1>
            </header>

            <section class="info-cards">
                <div class="card">
                    <h3>Some Users</h3>
                    <p>1,234</p>
                </div>
                <div class="card">
                    <h3>Revenue</h3>
                    <p>₹ 99,999</p>
                </div>
                <div class="card">
                    <h3>Delivered Orders</h3>
                    <p>123</p>
                </div>
                <div class="card">
                    <h3>Pending Orders</h3>
                    <p>10</p>
                </div>
            </section>
        </main>
    </div>
</body>

</html>
