<!-- 
Location-Based Weather Logger (Level-2) 
Scenario 
Create a web application that fetches the user's geographic location and stores location history in localStorage. 
 
📌 Requirements 
Button: Get My Location 
Use: 
navigator.geolocation.getCurrentPosition() 
Display: 
Latitude 
Longitude 
Handle: 
Permission denied 
Timeout 
Location unavailable 
Save last 5 location entries in localStorage. 
Display location history on page load. 
  
🛠️ Technical Constraints 
Must handle: 
Success callback 
Error callback 
Use browser permission handling. 
Store data as JSON using: 
JSON.stringify() 
JSON.parse() 
Use inline event (onclick). 
🎯 Learning Outcome 
Learners should be able to: 
Geolocation API 
Handling browser permissions 
Error handling in APIs 
Managing structured data in localStorage 
JSON parsing and stringifying 
-->
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Location-Based Weather Logger</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 20px;
        }

        button {
            padding: 10px 15px;
            font-size: 16px;
            cursor: pointer;
        }

        #current,
        #error {
            margin-top: 15px;
        }

        #error {
            color: red;
        }

        ul {
            list-style: none;
            padding: 0;
        }

        li {
            background: #f2f2f2;
            /* padding: 5px; */
            margin-bottom: 5px;
        }
    </style>
</head>

<body>

    <h1>location based</h1>

    <button onclick="getLocation()">Get My Location</button>

    <h2>Current Location</h2>
    <div id="current"></div>
    <div id="error"></div>

    <h2>Location History (Last 5)</h2>
    <ul id="history"></ul>
    <script>

        function getLocation() {
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(
                    success,
                    error,
                    {
                        enableHighAccuracy: true,
                        timeout: 5000,
                        maximumAge: 0
                    }
                );
            } else {
                document.getElementById("error").innerText =
                    "Geolocation is not supported by this browser.";
            }
        }

        function success(position) {

            const latitude = position.coords.latitude.toFixed(4);
            const longitude = position.coords.longitude.toFixed(4);

            document.getElementById("error").innerText = "";

            document.getElementById("current").innerHTML =
                `<p><strong>Latitude:</strong> ${latitude}</p>
                 <p><strong>Longitude:</strong> ${longitude}</p>`;

            saveLocation(latitude, longitude);
        }

        function error(err) {

            let message = "";

            switch (err.code) {
                case err.PERMISSION_DENIED:
                    message = "Permission denied by user.";
                    break;
                case err.POSITION_UNAVAILABLE:
                    message = "Location information is unavailable.";
                    break;
                case err.TIMEOUT:
                    message = "The request timed out.";
                    break;
                default:
                    message = "An unknown error occurred.";
            }

            document.getElementById("error").innerText = message;
        }

        function saveLocation(lat, lon) {

            let locations = JSON.parse(localStorage.getItem("locations")) || [];

            const newEntry = {
                latitude: lat,
                longitude: lon,
                time: new Date().toLocaleString()
            };

            locations.unshift(newEntry);

            if (locations.length > 5) {
                locations.pop();
            }

            localStorage.setItem("locations", JSON.stringify(locations));

            displayHistory();
        }

        function displayHistory() {

            const historyList = document.getElementById("history");
            historyList.innerHTML = "";

            const locations = JSON.parse(localStorage.getItem("locations")) || [];

            locations.forEach(loc => {
                const li = document.createElement("li");
                li.innerHTML =
                    `<strong>Latitude:</strong> ${loc.latitude}<br>
                    <strong>Longitude:</strong> ${loc.longitude}<br>
                    <strong>Time:</strong> ${loc.time}`;
                historyList.appendChild(li);
            });
        }
    </script>

</body>

</html>
