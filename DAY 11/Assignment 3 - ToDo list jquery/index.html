<!DOCTYPE html>
<html lang="en">
<!-- 
Problem 4 (Level-2): Interactive To-Do List Application 
Scenario: 
A productivity web app requires a dynamic To-Do List where users can add, mark as complete, and remove tasks using jQuery. 
 
📌 Requirements  
• Provide an input field and Add button to insert tasks. 
• Display tasks dynamically in a list. 
• Allow users to mark tasks as completed (strike-through effect). 
• Provide a delete button for each task. 
• Display total task count and completed task count dynamically. 
 
🛠️ Technical Constraints 
• Use jQuery for all DOM manipulation and event handling. 
• Use append(), remove(), toggleClass(), and on() methods. 
• No external libraries except jQuery. 
 
Expectations: 
• Proper dynamic element handling. 
• Efficient event binding for dynamically created elements. 
• Responsive and interactive UI behavior. 
 
🎯 Learning Outcome 
• Master jQuery DOM manipulation. 
• Implement dynamic event handling. 
• Build a small interactive application using jQuery.
-->

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To-Do List</title>
    <style>
        body {
            font-family: sans-serif;
            max-width: 480px;
            margin: 30px auto;
            padding: 0 16px;
        }

        .input {
            display: flex;
            gap: 8px;
            margin-bottom: 13px;
        }

        #taskInput {
            flex: 1;
            padding: 6px 10px;
            font-size: 14px;
        }

        .stats {
            font-size: 13px;
            margin-bottom: 8px;
        }

        #taskList {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        #taskList li {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px 0;
            border-bottom: 1px solid #f1efef;
        }

        .taskText {
            flex: 1;
            cursor: pointer;
        }

        li.completed .taskText {
            text-decoration: line-through;
            color: #a7a4a4;
        }

        .emptyMsg {
            color: #aba6a6;
            font-size: 13px;
        }

        .deleteBtn{
            background-color: rgb(212, 142, 142);
        }
    </style>
</head>

<body>
    <h1>To Do List</h1>

    <div class="input">
        <input type="text" id="taskInput" placeholder="Enter a new task..." />
        <button id="addBtn">Add</button>
    </div>

    <div class="stats">
        <div>Total: <span id="total">0</span></div>
        <div>Completed: <span id="completed">0</span></div>
    </div>

    <ul id="taskList">
        <li class="emptyMsg">no tasks yet , add one above</li>
    </ul>
</body>

<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
<script>
    $(document).ready(function () {

        function updateCount() {
            var total = $("#taskList li:not(.emptyMsg)").length;
            var completed = $("#taskList li.completed").length;

            $("#total").text(total);
            $("#completed").text(completed);

            if (total === 0) {
                $("#taskList").append('<li class="emptyMsg">no tasks yet, add one above</li>');
            }
        }

        function addTask() {
            var text = $("#taskInput").val();

            $(".emptyMsg").remove();

            var $newTask = $(
                '<li>' +
                '<span class="taskText">' + text + '</span>' +
                '<button class="deleteBtn">Delete</button>' +
                '</li>'
            );

            $("#taskList").append($newTask);
            $("#taskInput").val("").focus();
            updateCount();
        }

        $("#addBtn").on("click", addTask);

        $("#taskInput").on("keypress", function (e) {
            if (e.key === "Enter") addTask();
        });

        $("#taskList").on("click", ".taskText", function () {
            $(this).closest("li").toggleClass("completed");
            updateCount();
        });

        $("#taskList").on("click", ".deleteBtn", function () {
            $(this).closest("li").remove();
            updateCount();
        });

    });
</script>

</html>
